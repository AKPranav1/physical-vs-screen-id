  .sec{font:500 13px sans-serif;fill:#2C2C2A;}
  .box{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}
  .arr{stroke:#5F5E5A;stroke-width:1.2;fill:none;}
  .c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}
