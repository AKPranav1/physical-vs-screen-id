  @media (prefers-color-scheme: dark) {
    svg{background:#1a1a18;}
    .t,.th,.sec{fill:#EDEBE3;}
    .ts{fill:#B4B2A9;}
    .box{fill:#2C2C2A;stroke:#B4B2A9;}
    .arr{stroke:#B4B2A9;}
    .c-purple rect{fill:#3C3489;stroke:#AFA9EC;}
    .c-purple text{fill:#EEEDFE;}
    .c-purple .ts{fill:#CECBF6;}
    .c-teal rect{fill:#085041;stroke:#5DCAA5;}
    .c-teal text{fill:#E1F5EE;}
    .c-teal .ts{fill:#9FE1CB;}
    .c-coral rect{fill:#712B13;stroke:#F0997B;}
    .c-coral text{fill:#FAECE7;}
    .c-coral .ts{fill:#F5C4B3;}
    .c-amber rect{fill:#633806;stroke:#EF9F27;}
    .c-amber text{fill:#FAEEDA;}
    .c-amber .ts{fill:#FAC775;}
    .c-gray rect{fill:#444441;stroke:#B4B2A9;}
