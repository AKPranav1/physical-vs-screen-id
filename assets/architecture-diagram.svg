<svg width="1000" height="1560" viewBox="0 0 1000 1560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ID verification service architecture</title>
<desc>Startup eager-loads three models, then client bursts are decoded, embedded once via CLIP, cascaded through a 4-layer document-type classifier and a 7-signal presentation-attack fusion pipeline, merged into a response, logged, and returned. A separate CI/CD path shows GitHub Actions deploying the Dockerized app.</desc>
